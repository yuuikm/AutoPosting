services:
  bot:
    build: .
    container_name: autoposting-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
    volumes:
      - ./data:/app/data
      - /home/mark/projects/odyx/standard:/app/odyx_standard
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
